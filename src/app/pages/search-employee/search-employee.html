<div class="container mt-4">
  <div class="card shadow p-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2 class="mb-0">Search Employees</h2>
      <a routerLink="/employees" class="btn btn-secondary">Back</a>
    </div>

    <form [formGroup]="searchForm" (ngSubmit)="onSearch()">
      <div class="row">
        <div class="col-md-5 mb-3">
          <label class="form-label">Department</label>
          <input class="form-control" formControlName="department" placeholder="e.g. IT" />
        </div>

        <div class="col-md-5 mb-3">
          <label class="form-label">Designation</label>
          <input class="form-control" formControlName="designation" placeholder="e.g. Developer" />
        </div>

        <div class="col-md-2 mb-3 d-flex align-items-end gap-2">
          <button class="btn btn-primary w-100" type="submit" [disabled]="loading">
            {{ loading ? 'Searching...' : 'Search' }}
          </button>
        </div>
      </div>
    </form>

    <button class="btn btn-outline-secondary mb-3" (click)="resetSearch()">Reset</button>

    <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

    <div class="table-responsive">
      <table class="table table-bordered table-hover" *ngIf="employees.length > 0">
        <thead class="table-dark">
          <tr>
            <th>Photo</th>
            <th>Name</th>
            <th>Email</th>
            <th>Designation</th>
            <th>Department</th>
            <th>Salary</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let emp of employees">
            <td><img [src]="emp.employee_photo || 'https://via.placeholder.com/50'" width="50" height="50" class="rounded" /></td>
            <td>{{ emp.first_name }} {{ emp.last_name }}</td>
            <td>{{ emp.email }}</td>
            <td>{{ emp.designation }}</td>
            <td>{{ emp.department }}</td>
            <td>{{ emp.salary | currency }}</td>
          </tr>
        </tbody>
      </table>

      <div *ngIf="!loading && employees.length === 0" class="text-muted">
        No search results yet.
      </div>
    </div>
  </div>
</div>
