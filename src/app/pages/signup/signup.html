<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card shadow p-4">
        <h2 class="text-center mb-4">Sign Up</h2>

        <div *ngIf="successMessage" class="alert alert-success">
          {{ successMessage }}
        </div>

        <div *ngIf="errorMessage" class="alert alert-danger">
          {{ errorMessage }}
        </div>

        <form [formGroup]="signupForm" (ngSubmit)="onSubmit()">
          <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" class="form-control" formControlName="username" />
            <div class="text-danger mt-1" *ngIf="f['username'].touched && f['username'].invalid">
              Username is required.
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" formControlName="email" />
            <div class="text-danger mt-1" *ngIf="f['email'].touched && f['email'].errors?.['required']">
              Email is required.
            </div>
            <div class="text-danger mt-1" *ngIf="f['email'].touched && f['email'].errors?.['email']">
              Enter a valid email address.
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" formControlName="password" />
            <div class="text-danger mt-1" *ngIf="f['password'].touched && f['password'].errors?.['required']">
              Password is required.
            </div>
            <div class="text-danger mt-1" *ngIf="f['password'].touched && f['password'].errors?.['minlength']">
              Password must be at least 6 characters.
            </div>
          </div>

          <button type="submit" class="btn btn-primary w-100" [disabled]="loading">
            {{ loading ? 'Signing up...' : 'Sign Up' }}
          </button>
        </form>

        <p class="text-center mt-3 mb-0">
          Already have an account?
          <a routerLink="/login">Login</a>
        </p>
      </div>
    </div>
  </div>
</div>
